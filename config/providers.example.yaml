providers:
  akshare:
    enabled: true
    priority: 10
    require_credentials: false
    timeout_seconds: 10
    rate_limit_per_minute: 60
    credentials:
      api_key_env: null
      token_env: null
      cookie_env: null
      user_agent_env: FUND_AGENT_USER_AGENT
    capabilities:
      - FUND_NAV_HISTORY
      - FUND_PROFILE
      - FUND_HOLDINGS
      - INDEX_HISTORY
      - STOCK_HISTORY

  eastmoney:
    enabled: false
    priority: 20
    require_credentials: false
    timeout_seconds: 10
    rate_limit_per_minute: 30
    credentials:
      api_key_env: null
      token_env: null
      cookie_env: EASTMONEY_COOKIE
      user_agent_env: FUND_AGENT_USER_AGENT
    capabilities:
      - FUND_NAV_HISTORY
      - FUND_PROFILE
      - FUND_HOLDINGS
      - FUND_RANKING
      - INDEX_HISTORY
      - STOCK_QUOTE
    notes:
      - "Adapter must verify whether selected endpoints work without cookies."
      - "If cookies are required by an endpoint, fail with MISSING_CREDENTIALS and document it."

  xueqiu:
    enabled: false
    priority: 30
    require_credentials: true
    timeout_seconds: 10
    rate_limit_per_minute: 20
    credentials:
      api_key_env: null
      token_env: XUEQIU_TOKEN
      cookie_env: XUEQIU_COOKIE
      user_agent_env: FUND_AGENT_USER_AGENT
    capabilities:
      - STOCK_QUOTE
      - STOCK_HISTORY
      - SOCIAL_SENTIMENT
    notes:
      - "Do not assume public no-cookie access."
      - "Investigate whether selected endpoints require cookie/token."
      - "Do not commit cookies or tokens."

  news_mcp:
    enabled: false
    priority: 40
    require_credentials: true
    credentials:
      api_key_env: NEWS_API_KEY
      token_env: null
      cookie_env: null
    capabilities:
      - MARKET_NEWS
      - SEARCH
    notes:
      - "News MCP/API keys are host-owned."
      - "Core runtime must not know or hardcode these credentials."
      - "Supported env vars: NEWS_API_KEY, TAVILY_API_KEY, EXA_API_KEY, SERPAPI_API_KEY, CUSTOM_NEWS_MCP_TOKEN"
