name: plugin-ci

on:
  push:
  pull_request:

jobs:
  plugin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyyaml

      - name: Compile check
        run: PYTHONPATH=. python -m compileall src tests

      - name: Default test gate
        run: PYTHONPATH=. pytest -q

      - name: External host smoke test
        run: PYTHONPATH=. pytest tests/integration/test_external_host_smoke.py -q

      - name: Architecture boundaries
        run: PYTHONPATH=. pytest tests/architecture/test_architecture_boundaries.py -q
