  evidence_graph: src.schemas.evidence_graph:EvidenceGraph
  decision: src.schemas.decision:Decision
  execution_ledger: src.schemas.decision:ExecutionLedger
  fund_identity: src.schemas.fund:FundIdentity
  nav_point: src.schemas.fund:NavPoint
  fund_holding: src.schemas.fund:FundHolding
