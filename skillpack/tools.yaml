tools:
  - id: compile_evidence_graph
    import_path: src.tools.evidence.validators:compile_evidence_graph
    category: evidence
    pure_function: true
    network: false
    llm: false
    input_schema: list[src.schemas.evidence:EvidenceItem]
    output_schema: src.tools.evidence.validators:EvidenceGraphCompileResult
    produces:
      - EvidenceGraph
      - EvidenceGraphCompileReport
    notes: Full evidence pipeline validation, rejection, deduplication, conflict detection, hybrid upgrade, and confidence aggregation.

  - id: review_evidence_graph
    import_path: src.tools.evidence.review:review_evidence_graph
    category: evidence
    pure_function: true
    network: false
    llm: false
    input_schema: src.schemas.evidence_graph:EvidenceGraph
    output_schema: src.tools.evidence.review:EvidenceReviewResult
    produces:
      - EvidenceReviewResult
    notes: Optional host-callable evidence review helper, not an agent loop.

  - id: build_hard_evidence_from_metric
    import_path: src.tools.evidence.builders:build_hard_evidence_from_metric
    category: evidence_builder
    pure_function: true
    network: false
    llm: false
    input_schema: dict
    output_schema: src.schemas.evidence:EvidenceItem
    produces:
      - HardEvidence
    notes: Converts a local metric result into HardEvidence with confidence_weight 1.0.

  - id: build_soft_evidence_from_mcp_result
    import_path: src.tools.evidence.builders:build_soft_evidence_from_mcp_result
    category: evidence_builder
    pure_function: true
    network: false
    llm: false
    input_schema: dict
    output_schema: src.schemas.evidence:EvidenceItem
    produces:
      - SoftEvidence
    notes: Converts structured host MCP output into SoftEvidence.

  - id: calculate_sharpe
    import_path: src.tools.quant.metrics:calculate_sharpe
    category: quant
    pure_function: true
    network: false
    llm: false
    input_schema: list[float]
    output_schema: float
    produces:
      - SharpeRatio
    notes: Pure annualized Sharpe calculation.

  - id: calculate_sortino
    import_path: src.tools.quant.metrics:calculate_sortino
    category: quant
    pure_function: true
    network: false
    llm: false
    input_schema: list[float]
    output_schema: float
    produces:
      - SortinoRatio
    notes: Pure annualized Sortino calculation.

  - id: calculate_max_drawdown
    import_path: src.tools.quant.metrics:calculate_max_drawdown
    category: quant
    pure_function: true
    network: false
    llm: false
    input_schema: list[float]
    output_schema: float
    produces:
      - MaxDrawdown
    notes: Pure max drawdown calculation from NAV series.

  - id: calculate_volatility
    import_path: src.tools.quant.metrics:calculate_volatility
    category: quant
    pure_function: true
    network: false
    llm: false
    input_schema: list[float]
    output_schema: float
    produces:
      - AnnualizedVolatility
    notes: Pure annualized volatility calculation.

  - id: calculate_hhi
    import_path: src.tools.quant.metrics:calculate_hhi
    category: quant
    pure_function: true
    network: false
    llm: false
    input_schema: list[float]
    output_schema: float
    produces:
      - HHI
    notes: Holdings concentration metric.

  - id: normalize_nav_history
    import_path: src.tools.fund.metrics:normalize_nav_history
    category: fund
    pure_function: true
    network: false
    llm: false
    input_schema: list[dict] | dict
    output_schema: list[src.schemas.fund:NavPoint]
    produces:
      - NormalizedNavHistory
    notes: Normalizes host-provided NAV records without fetching data.

  - id: calculate_returns_from_nav
    import_path: src.tools.fund.metrics:calculate_returns_from_nav
    category: fund
    pure_function: true
    network: false
    llm: false
    input_schema: list[src.schemas.fund:NavPoint]
    output_schema: list[float]
    produces:
      - PeriodReturns
    notes: Calculates deterministic period returns from normalized NAV history.

  - id: calculate_fund_metrics
    import_path: src.tools.fund.metrics:calculate_fund_metrics
    category: fund
    pure_function: true
    network: false
    llm: false
    input_schema: list[src.schemas.fund:NavPoint]
    output_schema: dict
    produces:
      - FundRiskReturnMetrics
    notes: Computes total return, volatility, drawdown, Sharpe, and Sortino from local NAV history.

  - id: calculate_position_weights
    import_path: src.tools.portfolio.analysis:calculate_position_weights
    category: portfolio
    pure_function: true
    network: false
    llm: false
    input_schema: src.schemas.fund:PortfolioSnapshot
    output_schema: dict
    produces:
      - PositionWeights
    notes: Calculates current portfolio position weights from host-provided values.

  - id: calculate_theme_exposure
    import_path: src.tools.portfolio.analysis:calculate_theme_exposure
    category: portfolio
    pure_function: true
    network: false
    llm: false
    input_schema: dict
    output_schema: dict
    produces:
      - ThemeExposure
    notes: Aggregates exposure from local positions, fund profiles, and holdings.

  - id: calculate_concentration_metrics
    import_path: src.tools.portfolio.analysis:calculate_concentration_metrics
    category: portfolio
    pure_function: true
    network: false
    llm: false
    input_schema: list[src.schemas.fund:PortfolioPosition]
    output_schema: dict
    produces:
      - ConcentrationMetrics
    notes: Computes max single fund weight, HHI, top-N concentration, and duplicate tags.

  - id: detect_portfolio_risk_flags
    import_path: src.tools.portfolio.analysis:detect_portfolio_risk_flags
    category: portfolio
    pure_function: true
    network: false
    llm: false
    input_schema: dict
    output_schema: list[dict]
    produces:
      - PortfolioRiskFlags
    notes: Detects concentration, theme, cash reserve, trading budget, drawdown, and duplicate exposure flags.

  - id: simulate_rebalance
    import_path: src.tools.portfolio.analysis:simulate_rebalance
    category: portfolio
    pure_function: true
    network: false
    llm: false
    input_schema: dict
    output_schema: dict
    produces:
      - SuggestedRebalancePlan
    notes: Simulates a plain suggested trade plan without producing Decision objects.

  - id: simulate_position_ledger
    import_path: src.tools.ledger.settlement:simulate_position_ledger
    category: ledger
    pure_function: true
    network: false
    llm: false
    input_schema: dict
    output_schema: dict
    produces:
      - PositionLedgerSimulation
    notes: Pure deterministic position ledger simulation.

  - id: simulate_dca_plan
    import_path: src.tools.ledger.dca:simulate_dca_plan
    category: ledger
    pure_function: true
    network: false
    llm: false
    input_schema: dict
    output_schema: dict
    produces:
      - DCAPlanSimulation
    notes: Pure deterministic dollar-cost averaging simulation.

  - id: MCPHostAdapter
    import_path: src.tools.adapters.mcp:MCPHostAdapter
    category: adapter_contract
    pure_function: false
    network: false
    llm: false
    input_schema: dict
    output_schema: dict
    produces:
      - MCPAdapterBoundary
    notes: Host capability boundary. Concrete provider networking belongs to the external host, not fund-agent.
